<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Card Vault Customs — Final Logo (Concept B)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Poppins',system-ui,sans-serif;background:#eef1f6;color:#0c1322;padding:44px 20px;}
  .wrap{max-width:980px;margin:0 auto;}
  h1{font-size:26px;font-weight:800;margin-bottom:4px;}
  .sub{color:#5b6678;font-family:system-ui;margin-bottom:30px;}
  h2{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#5b6678;margin:30px 0 12px;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .panel{border-radius:16px;padding:36px;display:flex;align-items:center;justify-content:center;min-height:150px;border:1px solid #dce0ea;}
  .light{background:#fff;}
  .navy{background:#0c1322;border-color:#1e2740;}
  .icons{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
  .chip{border:1px solid #dce0ea;border-radius:16px;padding:22px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .chip .cap{font-size:11px;color:#5b6678;font-family:system-ui;}
  .favrow{display:flex;align-items:center;gap:16px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Card Vault Customs — Logo System</h1>
  <p class="sub">Concept B, refined. Primary lockup + standalone icon + square avatar.</p>

  <h2>Primary lockup</h2>
  <div class="row">
    <div class="panel light">
      <svg width="360" height="96" viewBox="0 0 360 96">
        <g transform="translate(6,10)">
          <rect x="0" y="0" width="58" height="78" rx="10" fill="none" stroke="#0c1322" stroke-width="3.5"/>
          <rect x="10" y="10" width="38" height="11" rx="3" fill="#b8923a"/>
          <path d="M29 36 l12 14 -12 14 -12-14 z" fill="none" stroke="#0c1322" stroke-width="3.5" stroke-linejoin="round"/>
        </g>
        <text x="86" y="42" font-family="Poppins" font-weight="800" font-size="27" letter-spacing="1.5" fill="#0c1322">CARD <tspan fill="#b8923a">VAULT</tspan></text>
        <text x="87" y="70" font-family="Poppins" font-weight="700" font-size="19" letter-spacing="9.5" fill="#0c1322">CUSTOMS</text>
      </svg>
    </div>
    <div class="panel navy">
      <svg width="360" height="96" viewBox="0 0 360 96">
        <g transform="translate(6,10)">
          <rect x="0" y="0" width="58" height="78" rx="10" fill="none" stroke="#ffffff" stroke-width="3.5"/>
          <rect x="10" y="10" width="38" height="11" rx="3" fill="#d8b25a"/>
          <path d="M29 36 l12 14 -12 14 -12-14 z" fill="none" stroke="#d8b25a" stroke-width="3.5" stroke-linejoin="round"/>
        </g>
        <text x="86" y="42" font-family="Poppins" font-weight="800" font-size="27" letter-spacing="1.5" fill="#ffffff">CARD <tspan fill="#d8b25a">VAULT</tspan></text>
        <text x="87" y="70" font-family="Poppins" font-weight="700" font-size="19" letter-spacing="9.5" fill="#ffffff">CUSTOMS</text>
      </svg>
    </div>
  </div>

  <h2>Standalone icon (stickers, watermark) &amp; square avatar (Instagram, favicon)</h2>
  <div class="icons">
    <div class="chip">
      <svg width="80" height="100" viewBox="0 0 80 100">
        <g transform="translate(11,11)">
          <rect x="0" y="0" width="58" height="78" rx="10" fill="none" stroke="#0c1322" stroke-width="3.5"/>
          <rect x="10" y="10" width="38" height="11" rx="3" fill="#b8923a"/>
          <path d="M29 36 l12 14 -12 14 -12-14 z" fill="none" stroke="#0c1322" stroke-width="3.5" stroke-linejoin="round"/>
        </g>
      </svg>
      <span class="cap">Icon (light)</span>
    </div>
    <div class="chip" style="background:#0c1322;border-color:#1e2740;">
      <svg width="80" height="100" viewBox="0 0 80 100">
        <g transform="translate(11,11)">
          <rect x="0" y="0" width="58" height="78" rx="10" fill="none" stroke="#ffffff" stroke-width="3.5"/>
          <rect x="10" y="10" width="38" height="11" rx="3" fill="#d8b25a"/>
          <path d="M29 36 l12 14 -12 14 -12-14 z" fill="none" stroke="#d8b25a" stroke-width="3.5" stroke-linejoin="round"/>
        </g>
      </svg>
      <span class="cap" style="color:#9aa7bd;">Icon (reverse)</span>
    </div>
    <div class="chip">
      <svg width="120" height="120" viewBox="0 0 240 240">
        <rect x="0" y="0" width="240" height="240" rx="40" fill="#0c1322"/>
        <g transform="translate(86,62)">
          <rect x="0" y="0" width="68" height="92" rx="12" fill="none" stroke="#d8b25a" stroke-width="4"/>
          <rect x="12" y="12" width="44" height="13" rx="4" fill="#d8b25a"/>
          <path d="M34 42 l14 16 -14 16 -14-16 z" fill="#d8b25a"/>
        </g>
      </svg>
      <span class="cap">Avatar (square)</span>
    </div>
    <div class="favrow">
      <div class="chip" style="padding:14px;">
        <svg width="32" height="32" viewBox="0 0 240 240">
          <rect x="0" y="0" width="240" height="240" rx="40" fill="#0c1322"/>
          <g transform="translate(86,62)">
            <rect x="0" y="0" width="68" height="92" rx="12" fill="none" stroke="#d8b25a" stroke-width="4"/>
            <rect x="12" y="12" width="44" height="13" rx="4" fill="#d8b25a"/>
            <path d="M34 42 l14 16 -14 16 -14-16 z" fill="#d8b25a"/>
          </g>
        </svg>
        <span class="cap">Favicon 32px</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
