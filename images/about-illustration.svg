<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" width="640" height="480" role="img" aria-label="Illustration of custom Card Vault Customs slabs">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16294a"/>
      <stop offset="1" stop-color="#0a1322"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.18" r="0.7">
      <stop offset="0" stop-color="#d8b25a" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#d8b25a" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#d8b25a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="holo" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(18 0.5 0.5)">
      <stop offset="0" stop-color="#7ec8ff"/>
      <stop offset="0.28" stop-color="#b78cff"/>
      <stop offset="0.5" stop-color="#7effc8"/>
      <stop offset="0.72" stop-color="#ffd76a"/>
      <stop offset="1" stop-color="#7ec8ff"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6c878"/>
      <stop offset="1" stop-color="#b8923a"/>
    </linearGradient>

    <!-- Reusable slab -->
    <g id="slab">
      <rect x="0" y="0" width="150" height="212" rx="13" fill="#ffffff" stroke="#dfe4ef" stroke-width="1.5"/>
      <rect x="11" y="11" width="128" height="26" rx="6" fill="#0a1020"/>
      <rect x="18" y="19" width="58" height="4.5" rx="2.25" fill="#d8b25a"/>
      <rect x="18" y="27" width="40" height="3" rx="1.5" fill="#6b7790"/>
      <rect x="110" y="15" width="24" height="18" rx="4" fill="url(#gold)"/>
      <text x="122" y="28" font-family="Poppins, Arial, sans-serif" font-size="11" font-weight="800" fill="#1a1206" text-anchor="middle">10</text>
      <!-- holo window -->
      <rect x="12" y="44" width="126" height="156" rx="9" fill="url(#holo)"/>
      <rect x="12" y="44" width="126" height="156" rx="9" fill="url(#sheen)"/>
      <!-- generic family portrait silhouette -->
      <g opacity="0.9" fill="#0a1322" fill-opacity="0.30">
        <circle cx="58" cy="108" r="17"/>
        <path d="M34 168 q24 -34 48 0 z" />
        <circle cx="93" cy="118" r="13"/>
        <path d="M76 168 q17 -26 34 0 z" />
      </g>
      <path d="M75 95 l4 5 4 -5 a3.4 3.4 0 0 0 -5 -2 a3.4 3.4 0 0 0 -3 2 z" fill="#ffffff" fill-opacity="0.85"/>
    </g>

    <g id="spark" fill="#f0d68a">
      <path d="M0 -7 L1.4 -1.4 7 0 1.4 1.4 0 7 -1.4 1.4 -7 0 -1.4 -1.4 Z"/>
    </g>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="640" height="480" rx="16" fill="url(#bg)"/>
  <rect x="0" y="0" width="640" height="480" rx="16" fill="url(#glow)"/>

  <!-- sparkles -->
  <use href="#spark" x="92" y="70" transform="scale(0.9)"/>
  <use href="#spark" x="540" y="92"/>
  <use href="#spark" x="500" y="300" transform="scale(0.7)"/>
  <use href="#spark" x="120" y="360" transform="scale(0.8)"/>
  <use href="#spark" x="320" y="58" transform="scale(0.6)"/>
  <circle cx="430" cy="64" r="2.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="170" cy="120" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="560" cy="220" r="2.5" fill="#ffffff" opacity="0.45"/>

  <!-- back-left slab -->
  <g transform="translate(70 160) rotate(-13)">
    <use href="#slab"/>
  </g>
  <!-- back-right slab -->
  <g transform="translate(370 150) rotate(13)">
    <use href="#slab"/>
  </g>
  <!-- front-center slab -->
  <g transform="translate(245 120) rotate(-2) scale(1.06)">
    <use href="#slab"/>
  </g>

  <!-- ribbon -->
  <g transform="translate(320 432)">
    <rect x="-168" y="-22" width="336" height="40" rx="20" fill="url(#gold)"/>
    <text x="0" y="5" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="700" fill="#1a1206" text-anchor="middle">Handmade with &#10084; by two of us</text>
  </g>
</svg>
